<script>
(function() {

    }, function() {});
}
var DEF_GOAL = 75.0;
var HT = 176.5;
var AGE = 29;
var START_W = 89.73;
var TODAY = (function() {

  { l: '자전거',    icon: '🚴', met: 6.8, d: '중강도 사이클' },
  { l: '수영',      icon: '🏊', met: 6.0, d: '중강도 수영' },

/* ─── STORAGE ────────────────────────────────── */
function loadData() {
  try {
    if (window.__cloudData) {
      var cd = JSON.parse(window.__cloudData);
      localStorage.setItem(STORE, window.__cloudData);
      window.__cloudData = null;
      return cd;
    }
    var r = localStorage.getItem(STORE);
    if (r) return JSON.parse(r);
  } catch(e) {}
  return null;
}
function saveData(d) {
  try {
    var json = JSON.stringify(d);
    localStorage.setItem(STORE, json);

}
function getApiKey() { return localStorage.getItem('diet-ak') || ''; }

/* ─── MATH ───────────────────────────────────── */
function calcBMR(w) { return Math.round(10 * w + 6.25 * HT - 5 * AGE + 5); }
function calcTDEE(w) { return Math.round(calcBMR(w) * 1.375); }
function calcTgt(w, exC, weeklyLoss) {
  w = w || 89.73; exC = exC || 0; weeklyLoss = weeklyLoss || 0.5;
  var b = calcBMR(w), t = calcTDEE(w);
  var deficit = Math.round(weeklyLoss * 1100);
  var cal = Math.max(1500, Math.round(t - deficit + exC * 0.5));
  var pro = Math.round(w * 1.8);
  var fat = Math.round(cal * 0.27 / 9);
  var carb = Math.max(80, Math.round((cal - pro * 4 - fat * 9) / 4));
  return { cal: cal, pro: pro, fat: fat, carb: carb, sug: 50, sod: 2000, bmr: b, tdee: t };
}
function burnCal(met, mins, w) { return Math.round(met * w * mins / 60); }
function fmtDate(s) { var d = new Date(s + 'T12:00:00'); return (d.getMonth() + 1) + '/' + d.getDate(); }

function clamp01(a, b) { return Math.min(1, Math.max(0, a / Math.max(1, b))); }
function mx(base, extra) { return Object.assign({}, base, extra); }
function getM(td) { var ms = td.measurements; if (ms && ms.length) return ms[ms.length-1]; return td.measurement || null; }
function getAllM(td) { if (td.measurements && td.measurements.length) return td.measurements; return td.measurement ? [td.measurement] : []; }

/* ─── SHARED STYLES ──────────────────────────── */
var CARD  = { background: C.card, border: '1px solid ' + C.bd, borderRadius: '14px', padding: '14px 16px', marginBottom: '12px' };

/* ─── SVG LINE CHART (no external library) ───── */
function LineChart(props) {
  var data = props.data || [];
  var color = props.color || C.cc;
  var domain = props.domain || [0, 100];
  var goal = props.goal;
  var unit = props.unit || '';
  var W = 340, H = props.height || 170, pL = 36, pR = 26, pT = 22, pB = 28;
  var cW = W - pL - pR, cH = H - pT - pB;
  var minV = domain[0], maxV = domain[1];
  function xP(i) { return data.length <= 1 ? pL + cW / 2 : pL + (i / (data.length - 1)) * cW; }
  function yP(v) { var c = Math.min(maxV, Math.max(minV, v)); return pT + (1 - (c - minV) / (maxV - minV)) * cH; }
  var pathD = '';
  if (data.length > 1) {
    pathD = data.map(function(d, i) { return (i === 0 ? 'M' : 'L') + xP(i).toFixed(1) + ',' + yP(d.value).toFixed(1); }).join(' ');
  }

  });

    elems.push(h('line', { key: 'gr', x1: pL, y1: yP(goal), x2: W - pR, y2: yP(goal), stroke: C.acc, strokeWidth: 1.5, strokeDasharray: '5 4' }));
    elems.push(h('text', { key: 'grl', x: W - pR + 3, y: yP(goal) + 4, fill: C.aL, fontSize: 9 }, '목표'));
  }
  if (pathD) { elems.push(h('path', { key: 'ln', d: pathD, fill: 'none', stroke: color, strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' })); }
  var onClickPoint = props.onClickPoint;
  var selectedIndex = props.selectedIndex != null ? props.selectedIndex : -1;
  data.forEach(function(d, i) {
    var x = xP(i), y = yP(d.value);
    var isSel = selectedIndex === i;
    elems.push(h('text',   { key: 'vl' + i, x: x, y: y - 9, textAnchor: 'middle', fill: isSel ? '#fff' : color, fontSize: isSel ? 11 : 10, fontWeight: '700' }, '' + d.value + unit));
    elems.push(h('circle', { key: 'dt' + i, cx: x, cy: y, r: isSel ? 9 : 5, fill: color, stroke: isSel ? '#fff' : '#13131e', strokeWidth: isSel ? 3 : 2 }));
    elems.push(h('text',   { key: 'xl' + i, x: x, y: H - 4, textAnchor: 'middle', fill: isSel ? C.aL : '#555', fontSize: 9, fontWeight: isSel ? '700' : '400' }, d.lbl));
    if (onClickPoint) {
      elems.push(h('circle', { key: 'hx' + i, cx: x, cy: y, r: 20, fill: 'transparent', style: { cursor: 'pointer' },
        onClick: (function(idx) { return function() { onClickPoint(idx); }; })(i) }));
    }
  });
  return h('svg', { viewBox: '0 0 ' + W + ' ' + H, style: { width: '100%', height: H + 'px', display: 'block', overflow: 'visible' } }, elems);
}

/* ─── RING ───────────────────────────────────── */
function Ring(props) {
  var val = props.val, max = props.max, color = props.color || C.cc;
  var sz = props.sz || 76, lbl = props.lbl, sub = props.sub;
  var r = sz / 2 - 7, cx = sz / 2, cy = sz / 2;

  var p = clamp01(val, max);
  var over = val > max;
  return h('div', { style: { textAlign: 'center' } },
    h('svg', { width: sz, height: sz },
      h('circle', { cx: cx, cy: cy, r: r, fill: 'none', stroke: C.c2, strokeWidth: 6 }),
      h('circle', { cx: cx, cy: cy, r: r, fill: 'none', stroke: over ? C.ce : color, strokeWidth: 6,
        strokeDasharray: (circ * p).toFixed(2) + ' ' + circ.toFixed(2), strokeLinecap: 'round',
        transform: 'rotate(-90 ' + cx + ' ' + cy + ')' }),
      h('text', { x: cx, y: cy - 4, textAnchor: 'middle', fill: C.tx, fontSize: '' + Math.round(sz * 0.16), fontWeight: '700' }, '' + val),
      h('text', { x: cx, y: cy + 10, textAnchor: 'middle', fill: C.sub, fontSize: '' + Math.round(sz * 0.1) }, '' + sub)
    ),
    lbl ? h('p', { style: { margin: '3px 0 0', fontSize: '11px', color: C.sub } }, lbl) : null

}

/* ─── BAR ────────────────────────────────────── */
function Bar(props) {
  var p = clamp01(props.curr, props.max), over = props.curr > props.max, unit = props.unit || 'g';
  return h('div', { style: { marginBottom: '10px' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', marginBottom: '4px' } },
      h('span', null, h('span', { style: { color: C.sub } }, props.lbl + '  '), h('span', { style: { color: props.color, fontWeight: '700', fontSize: '11px' } }, Math.round(p * 100) + '%')),
      h('span', null,

    )

}

/* ─── GOAL SLIDER ────────────────────────────── */
function GoalSlider(props) {
  var goal = props.goal, upd = props.updateGoal, curW = props.curW;
  var weeklyLoss = props.weeklyLoss || 0.5, updWL = props.updateWeeklyLoss;
  var ls = useState(goal); var lv = ls[0], setLv = ls[1];
  var wls = useState(weeklyLoss); var wlv = wls[0], setWlv = wls[1];
  var timer = useRef(null);
  useEffect(function() { setLv(goal); }, [goal]);
  useEffect(function() { setWlv(weeklyLoss); }, [weeklyLoss]);
  function onBlur(raw) {
    var g = Math.round(Math.min(89, Math.max(60, parseFloat(raw) || 60)) * 10) / 10;
    setLv(g); upd(g);
  }
  function onWLChange(raw) {
    var wl = Math.round(parseFloat(raw) * 10) / 10;
    setWlv(wl); updWL(wl);
  }
  var diff = Math.max(0, curW - lv);
  var lost = Math.max(0, START_W - curW);
  var weeks = wlv > 0 ? Math.ceil(diff / wlv) : 999;
  return h('div', { style: CARD },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' } },
      h('p', { style: CTITL }, '목표 체중 설정'),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '5px' } },
        h('input', {
          type: 'number', value: lv, min: 60, max: 89, step: 0.1,
          onChange: function(e) { setLv(e.target.value); clearTimeout(timer.current); timer.current = setTimeout(function() { onBlur(e.target.value); }, 600); },
          onBlur: function(e) { onBlur(e.target.value); },
          style: { width: '72px', textAlign: 'center', fontSize: '20px', fontWeight: '700', color: C.aL, background: 'transparent', border: 'none', borderBottom: '2px solid ' + C.aL, padding: '2px 4px', outline: 'none' }
        }),
        h('span', { style: { fontSize: '14px', color: C.sub } }, 'kg')

    ),
    h('div', { style: { marginBottom: '14px' } },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } },
        h('span', { style: { fontSize: '12px', color: C.sub } }, '1주일당 감소량'),
        h('span', { style: { fontSize: '14px', fontWeight: '700', color: C.cm } }, wlv.toFixed(1) + ' kg / 주')
      ),
      h('input', { type: 'range', min: 0.3, max: 1.0, step: 0.1, value: wlv, onChange: function(e) { onWLChange(e.target.value); }, style: { margin: '2px 0 4px' } }),
      h('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '10px', color: C.sub } },
        h('span', null, '0.3 kg (느리게)'), h('span', null, '1.0 kg (빠르게)')
      )
    ),
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '6px', textAlign: 'center' } },
      h('div', { style: SBOX }, h('p', { style: SLBL }, '시작'),     h('p', { style: { margin: 0, fontSize: '13px', fontWeight: '700', color: '#888' } }, START_W + 'kg')),
      h('div', { style: SBOX }, h('p', { style: SLBL }, '현재'),     h('p', { style: { margin: 0, fontSize: '13px', fontWeight: '700', color: C.cw  } }, curW + 'kg')),
      h('div', { style: SBOX }, h('p', { style: SLBL }, '감량 목표'), h('p', { style: { margin: 0, fontSize: '13px', fontWeight: '700', color: C.cf  } }, diff.toFixed(1) + 'kg')),
      h('div', { style: SBOX }, h('p', { style: SLBL }, '예상 기간'), h('p', { style: { margin: 0, fontSize: '13px', fontWeight: '700', color: C.cm  } }, weeks + '주'))
    ),
    lost > 0.01 ? h('p', { style: { margin: '10px 0 0', fontSize: '12px', color: C.cm, textAlign: 'center', padding: '7px', background: 'rgba(52,211,153,.08)', borderRadius: '8px' } },
      '이미 ' + lost.toFixed(2) + 'kg 감량했어요!'
    ) : null

/* ─── DASHBOARD ──────────────────────────────── */
function DashScreen(props) {
  var td = props.td, t = props.tgt, cn = props.consumed;
  var w = props.w, goal = props.goal, updG = props.updateGoal;
  var weeklyLoss = props.weeklyLoss, updWL = props.updateWeeklyLoss;
  var isWide = props.isWide;
  var data = props.data;
  var dvm = useState('daily'); var dashView = dvm[0], setDashView = dvm[1];
  var dsd = useState(null); var dashSelDate = dsd[0], setDashSelDate = dsd[1];
  var bks = useState(false); var showBackup = bks[0], setShowBackup = bks[1];
  var importRef = useRef(null);
  var replaceData = props.replaceData;
  var m = getM(td), curW = m ? m.weight : w;
  var prog = curW <= goal ? 100 : Math.max(0, (START_W - curW) / (START_W - goal) * 100);
  var rem = t.cal - cn.cal, exB = sumKey(td.exercises, 'calories');
  var wAllDates = Object.keys(data).filter(function(k) { return k !== '__settings' && getM(data[k]); }).sort();
  var wRawPts = wAllDates.map(function(k) { return { date: k, value: getM(data[k]).weight }; });
  var wChartData;
  if (dashView === 'weekly') {
    var wkM = {};
    wRawPts.forEach(function(p) { var d = new Date(p.date); var thu = new Date(d); thu.setDate(d.getDate() - ((d.getDay() + 6) % 7) + 3); var wk = thu.getFullYear() + '-W' + ('0' + Math.ceil((thu - new Date(thu.getFullYear(), 0, 1)) / 604800000 + 1)).slice(-2); if (!wkM[wk]) wkM[wk] = { sum: 0, n: 0 }; wkM[wk].sum += p.value; wkM[wk].n++; });
    wChartData = Object.keys(wkM).sort().map(function(k) { return { lbl: k, value: Math.round(wkM[k].sum / wkM[k].n * 10) / 10 }; });
  } else if (dashView === 'monthly') {
    var moM = {};
    wRawPts.forEach(function(p) { var k2 = p.date.substring(0, 7); if (!moM[k2]) moM[k2] = { sum: 0, n: 0 }; moM[k2].sum += p.value; moM[k2].n++; });
    wChartData = Object.keys(moM).sort().map(function(k) { return { lbl: k, value: Math.round(moM[k].sum / moM[k].n * 10) / 10 }; });
  } else {
    wChartData = wRawPts.map(function(p) { return { lbl: fmtDate(p.date), value: p.value }; });
  }
  var wSelIdx = dashSelDate ? wAllDates.indexOf(dashSelDate) : -1;
  var wDVIEWS = [{ k: 'daily', lbl: '일별' }, { k: 'weekly', lbl: '주별' }, { k: 'monthly', lbl: '월별' }];
  var cardWeightChart = h('div', { style: CARD },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' } },
      h('p', { style: mx(CTITL, { margin: 0 }) }, '체중 변화 📈'),
      h('div', { style: { display: 'flex', gap: '4px' } },
        wDVIEWS.map(function(v) {
